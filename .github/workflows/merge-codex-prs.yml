name: Merge Codex PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - ready_for_review

  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to merge. Leave blank to scan all open PRs."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

concurrency:
  group: merge-codex-prs-${{ github.repository }}
  cancel-in-progress: false

jobs:
  merge-codex-prs:
    name: Merge Codex PRs
    runs-on: ubuntu-latest

    env:
      CODEX_LABEL: codex

    steps:
      - name: Pick PRs to check
        id: pick_prs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          echo "Repository: $REPO"
          echo "Event name: $EVENT_NAME"

          if [ -n "${INPUT_PR_NUMBER:-}" ]; then
            echo "Manual PR number supplied: $INPUT_PR_NUMBER"
            echo "prs=$INPUT_PR_NUMBER" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request_target" ]; then
            echo "Triggered by PR event. PR number: $EVENT_PR_NUMBER"
            echo "prs=$EVENT_PR_NUMBER" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Scheduled run. Scanning all open PRs."

          prs="$(gh pr list \
            --repo "$REPO" \
            --state open \
            --limit 100 \
            --json number,labels \
            --jq '.[] | select([.labels[].name | ascii_downcase] | index(env.CODEX_LABEL)) | .number' \
            | xargs || true)"

          echo "PRs found: $prs"
          echo "prs=$prs" >> "$GITHUB_OUTPUT"

      - name: Merge Codex-labeled PRs
        if: steps.pick_prs.outputs.prs != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PRS: ${{ steps.pick_prs.outputs.prs }}
        run: |
          set -u

          echo "PRs to process: $PRS"

          for PR in $PRS; do
            echo ""
            echo "============================================================"
            echo "Checking PR #$PR"
            echo "============================================================"

            echo "Reading PR information..."

            pr_json="$(gh pr view "$PR" \
              --repo "$REPO" \
              --json number,url,state,isDraft,labels,mergeStateStatus,reviewDecision,baseRefName,headRefName 2>&1)"

            view_status=$?

            if [ "$view_status" -ne 0 ]; then
              echo "Could not read PR #$PR."
              echo "$pr_json"
              continue
            fi

            echo "$pr_json" | jq .

            url="$(echo "$pr_json" | jq -r '.url')"
            state="$(echo "$pr_json" | jq -r '.state')"
            is_draft="$(echo "$pr_json" | jq -r '.isDraft')"
            merge_state="$(echo "$pr_json" | jq -r '.mergeStateStatus // "UNKNOWN"')"
            review_decision="$(echo "$pr_json" | jq -r '.reviewDecision // "UNKNOWN"')"
            has_codex_label="$(echo "$pr_json" | jq -r --arg label "$CODEX_LABEL" '[.labels[].name | ascii_downcase] | index($label) != null')"

            echo "URL: $url"
            echo "State: $state"
            echo "Draft: $is_draft"
            echo "Merge state: $merge_state"
            echo "Review decision: $review_decision"
            echo "Has codex label: $has_codex_label"

            if [ "$has_codex_label" != "true" ]; then
              echo "Skipping PR #$PR because it does not have the '$CODEX_LABEL' label."
              continue
            fi

            echo "Attempting to merge PR #$PR now..."

            merge_output="$(gh pr merge "$PR" \
              --repo "$REPO" \
              --merge \
              --delete-branch 2>&1)"

            merge_status=$?

            echo "$merge_output"

            if [ "$merge_status" -eq 0 ]; then
              echo "SUCCESS: PR #$PR was merged."
            else
              echo "FAILED: GitHub did not merge PR #$PR."
              echo "The most likely causes are:"
              echo "1. branch protection requires reviews"
              echo "2. branch protection requires status checks"
              echo "3. the PR has merge conflicts"
              echo "4. the PR is a draft"
              echo "5. merge commits are disabled in repo settings"
              echo "6. a ruleset is blocking the merge"
              echo "7. GitHub Actions does not have write permission"
            fi
          done
